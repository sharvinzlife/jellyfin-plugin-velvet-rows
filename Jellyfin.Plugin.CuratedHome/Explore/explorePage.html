<div class="velvetExplorePage" data-page-key="__VELVET_PAGE_KEY__">
    <section class="velvetExploreHero">
        <div class="velvetExploreCopy">
            <span class="velvetExploreEyebrow">Velvet Rows Explore</span>
            <h1>__VELVET_PAGE_TITLE__</h1>
            <p>__VELVET_PAGE_DESCRIPTION__</p>
        </div>
        <div class="velvetExploreBadge">Curated rails</div>
    </section>

    <div class="velvetExploreShelves"></div>

    <style>
        .velvetExplorePage {
            --ve-bg: #07111c;
            --ve-panel: linear-gradient(180deg, rgba(15, 28, 44, 0.96) 0%, rgba(9, 17, 28, 0.96) 100%);
            --ve-panel-border: rgba(113, 154, 184, 0.18);
            --ve-copy: #eef5fb;
            --ve-muted: #95a9ba;
            --ve-accent: #efb666;
            --ve-accent-2: #6be0d1;
            color: var(--ve-copy);
            display: grid;
            gap: 22px;
            padding-bottom: 28px;
        }
        .velvetExploreHero {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 18px;
            align-items: end;
            padding: 24px;
            border-radius: 28px;
            border: 1px solid var(--ve-panel-border);
            background:
                radial-gradient(circle at top left, rgba(107, 224, 209, 0.12), transparent 28%),
                radial-gradient(circle at top right, rgba(239, 182, 102, 0.14), transparent 28%),
                var(--ve-panel);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.24);
        }
        .velvetExploreEyebrow {
            text-transform: uppercase;
            letter-spacing: 0.22em;
            font-size: 0.72rem;
            color: var(--ve-accent);
        }
        .velvetExploreHero h1 {
            margin: 8px 0 10px;
            font-size: clamp(2rem, 4vw, 3.4rem);
            line-height: 1;
            letter-spacing: -0.04em;
        }
        .velvetExploreHero p {
            margin: 0;
            max-width: 760px;
            color: var(--ve-muted);
            font-size: 1rem;
            line-height: 1.6;
        }
        .velvetExploreBadge {
            align-self: start;
            padding: 10px 14px;
            border-radius: 999px;
            background: linear-gradient(135deg, rgba(239, 182, 102, 0.16) 0%, rgba(107, 224, 209, 0.16) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #ffd8a7;
            font-weight: 700;
        }
        .velvetExploreShelves {
            display: grid;
            gap: 22px;
        }
        .velvetExploreShelf {
            padding: 20px 22px 22px;
            border-radius: 24px;
            border: 1px solid var(--ve-panel-border);
            background: var(--ve-panel);
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.22);
        }
        .velvetExploreShelfHeader {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            align-items: end;
            margin-bottom: 16px;
        }
        .velvetExploreShelfHeader h2 {
            margin: 0 0 6px;
            font-size: 1.35rem;
        }
        .velvetExploreShelfHeader p {
            margin: 0;
            color: var(--ve-muted);
        }
        .velvetExploreCount {
            padding: 7px 11px;
            border-radius: 999px;
            background: rgba(107, 224, 209, 0.1);
            color: #bafef6;
            font-size: 0.85rem;
            white-space: nowrap;
        }
        .velvetExploreRow {
            display: grid;
            grid-auto-flow: column;
            grid-auto-columns: minmax(180px, 19vw);
            gap: 16px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: thin;
        }
        .velvetExploreCard {
            display: grid;
            gap: 10px;
            text-decoration: none;
            color: inherit;
        }
        .velvetExplorePoster {
            aspect-ratio: 2 / 3;
            border-radius: 18px;
            overflow: hidden;
            background:
                linear-gradient(160deg, rgba(107, 224, 209, 0.16) 0%, rgba(12, 21, 36, 0.96) 54%, rgba(239, 182, 102, 0.18) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.24);
        }
        .velvetExplorePoster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .velvetExploreMeta {
            display: grid;
            gap: 4px;
        }
        .velvetExploreMeta strong {
            font-size: 1rem;
            line-height: 1.3;
        }
        .velvetExploreMeta span {
            color: var(--ve-muted);
            font-size: 0.9rem;
        }
        .velvetExploreEmpty {
            padding: 20px;
            border-radius: 18px;
            background: rgba(7, 13, 22, 0.62);
            color: var(--ve-muted);
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }
        @media (max-width: 900px) {
            .velvetExploreHero {
                grid-template-columns: 1fr;
            }
            .velvetExploreRow {
                grid-auto-columns: minmax(160px, 68vw);
            }
        }
    </style>

    <script>
        (function () {
            var roots = document.querySelectorAll('.userPreferencesPage:not(.hide) .velvetExplorePage');
            var root = roots[roots.length - 1];
            if (!root || root.dataset.loaded === 'true') {
                return;
            }
            root.dataset.loaded = 'true';

            var pageKey = root.getAttribute('data-page-key');
            var shelvesRoot = root.querySelector('.velvetExploreShelves');

            function escapeHtml(value) {
                return String(value || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            function yearFor(item) {
                if (item.ProductionYear) {
                    return item.ProductionYear;
                }
                if (item.PremiereDate) {
                    return new Date(item.PremiereDate).getFullYear();
                }
                return '';
            }

            function imageUrl(item) {
                return ApiClient.getUrl('Items/' + item.Id + '/Images/Primary?maxWidth=480&quality=90');
            }

            function renderItem(item) {
                var image = imageUrl(item);
                var year = yearFor(item);
                return [
                    '<a class="velvetExploreCard" href="#/details?id=' + encodeURIComponent(item.Id) + '">',
                    '<div class="velvetExplorePoster">',
                    '<img loading="lazy" src="' + image + '" alt="' + escapeHtml(item.Name) + ' poster">',
                    '</div>',
                    '<div class="velvetExploreMeta">',
                    '<strong>' + escapeHtml(item.Name || '') + '</strong>',
                    '<span>' + escapeHtml(year) + '</span>',
                    '</div>',
                    '</a>'
                ].join('');
            }

            function renderShelf(shelf) {
                if (!shelf.items || !shelf.items.length) {
                    return [
                        '<section class="velvetExploreShelf">',
                        '<div class="velvetExploreShelfHeader">',
                        '<div><h2>' + escapeHtml(shelf.title) + '</h2><p>' + escapeHtml(shelf.description) + '</p></div>',
                        '<span class="velvetExploreCount">0 items</span>',
                        '</div>',
                        '<div class="velvetExploreEmpty">No clean metadata-matched titles are ready for this shelf yet.</div>',
                        '</section>'
                    ].join('');
                }

                return [
                    '<section class="velvetExploreShelf">',
                    '<div class="velvetExploreShelfHeader">',
                    '<div><h2>' + escapeHtml(shelf.title) + '</h2><p>' + escapeHtml(shelf.description) + '</p></div>',
                    '<span class="velvetExploreCount">' + shelf.items.length + ' items</span>',
                    '</div>',
                    '<div class="velvetExploreRow">',
                    shelf.items.map(renderItem).join(''),
                    '</div>',
                    '</section>'
                ].join('');
            }

            shelvesRoot.innerHTML = '<section class="velvetExploreShelf"><div class="velvetExploreEmpty">Loading curated shelves...</div></section>';

            ApiClient.getJSON(ApiClient.getUrl('VelvetRows/ExploreData?page=' + encodeURIComponent(pageKey) + '&userId=' + encodeURIComponent(ApiClient.getCurrentUserId())))
                .then(function (response) {
                    shelvesRoot.innerHTML = (response.shelves || []).map(renderShelf).join('');
                })
                .catch(function () {
                    shelvesRoot.innerHTML = '<section class="velvetExploreShelf"><div class="velvetExploreEmpty">Velvet Rows could not load this explore page right now.</div></section>';
                });
        })();
    </script>
</div>
